name: Build PR Docs Preview
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read # Strict read-only isolation boundary

jobs:
  validate:
    uses: ./.github/workflows/validate-schema.yml

  build-docs:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4
        
      - name: Setup Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install ONDE Dependencies
        run: pip install pydantic pyyaml mkdocs-material
        
      - name: Generate ONDE Documentation and CSV
        run: |
          python tools/generate_docs.py
          python tools/generate_csv.py
          
      - name: Capture PR Metadata
        run: |
          mkdir -p pr-metadata
          echo ${{ github.event.number }} > pr-metadata/pr-number
          
      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview-build
          path: |
            build/
            pr-metadata/
          retention-days: 1
