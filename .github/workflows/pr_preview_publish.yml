name: Publish PR Docs Preview
on:
  workflow_run:
    workflows: ["Build PR Docs Preview"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency: 
  group: pages-deployment
  cancel-in-progress: false

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs-preview-build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          
      - name: Read Target PR Number
        id: pr-info
        run: |
          PR_NUMBER=$(cat pr-metadata/pr-number)
          echo "pr_num=$PR_NUMBER" >> $GITHUB_OUTPUT
          
      - name: Deploy to GitHub Pages PR Preview
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/docs/site
          destination_dir: pr-preview/pr-${{ steps.pr-info.outputs.pr_num }}
          keep_files: true
          commit_message: "Deploy preview for PR ${{ steps.pr-info.outputs.pr_num }}"

      - name: Leave a comment on the PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr-info.outputs.pr_num }}
          header: pr-preview
          message: "🚀 PR Preview successfully deployed to: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-preview/pr-${{ steps.pr-info.outputs.pr_num }}/"
